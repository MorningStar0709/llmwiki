services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      MODE: local
      WORKSPACE_PATH: /workspace
      APP_URL: ${APP_URL:-http://localhost:3000}
      API_URL: http://localhost:8000
    volumes:
      - ./data:/workspace
    restart: unless-stopped

  mcp:
    build:
      context: .
      dockerfile: mcp/Dockerfile.remote
    ports:
      - "8080:8080"
    environment:
      WORKSPACE_PATH: /workspace
      PORT: "8080"
    volumes:
      - ./data:/workspace
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:8000}
    depends_on:
      - api
    restart: unless-stopped
